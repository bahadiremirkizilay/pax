<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Etkinliklerim - PAX</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GS721ZWJJF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GS721ZWJJF');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Yellowtail&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=20260330a">
    <link rel="stylesheet" href="cms.css?v=20260330a">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <img src="../star-icon.png" alt="Star" class="star-decoration">
                <div class="menu-toggle" id="mobile-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            
            <div class="nav-center">
                <a href="dashboard.html" class="logo" aria-label="Go to dashboard">
                    <img src="../pax-logo.png" alt="PAX" class="logo-image">
                </a>
            </div>
            
            <div class="nav-right">
                <button class="top-link create-event-btn-nav" id="create-event-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Yeni Etkinlik Oluştur
                </button>
                <button class="top-link dashboard-profile-btn" id="profile-btn" title="Profile">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>
                <button class="top-link dashboard-logout-btn" id="logout-btn" title="Çıkış Yap">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    <span class="logout-text">Çıkış Yap</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="events-section" id="events">
        <!-- Hero Spacer: Creates initial view where navbar stays visible -->
        <div class="events-hero-spacer"></div>
        
        <div class="section-container">
            <div class="events-grid" id="events-grid">
                <!-- Event cards will be generated by JavaScript -->
            </div>
        </div>

        <!-- Organizer Profile Modal -->
        <div class="profile-modal" id="profile-modal" style="display: none;">
            <div class="profile-modal-overlay" id="profile-modal-overlay"></div>
            <div class="profile-modal-content">
                <div class="profile-modal-header">
                    <h2>Organizatör Profili</h2>
                    <button class="profile-modal-close" id="profile-modal-close" aria-label="Close profile">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="profile-modal-body">
                    <div class="profile-form-group">
                        <label for="profile-org-name">Organizatör Adı *</label>
                        <input type="text" 
                               id="profile-org-name" 
                               class="profile-input" 
                               placeholder="Etkinlik organizatörü veya şirket adı">
                    </div>
                    <div class="profile-form-group">
                        <label for="profile-org-events">Aktif Etkinliklerim (yaklaşan)</label>
                        <input type="text" 
                               id="profile-org-events" 
                               class="profile-input profile-input-readonly" 
                               readonly
                               tabindex="-1">
                    </div>
                    
                    <div class="profile-divider"></div>
                    
                    <div class="profile-form-group">
                        <label class="profile-section-label">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                            Contact Information (en az 1 tane gerekli)
                        </label>
                    </div>
                    
                    <div class="profile-form-group">
                        <label for="profile-org-email">
                            E-posta Adresi
                            <span class="field-note">(özel email girmezseniz, giriş email'iniz kullanılır)</span>
                        </label>
                        <input type="email" 
                               id="profile-org-email" 
                               class="profile-input" 
                               placeholder="contact@yourcompany.com">
                    </div>
                    
                    <div class="profile-form-group">
                        <label for="profile-org-phone">Telefon Numarası</label>
                        <input type="tel" 
                               id="profile-org-phone" 
                               class="profile-input" 
                               placeholder="+1 (555) 123-4567">
                    </div>
                    
                    <div class="profile-form-group">
                        <label for="profile-org-instagram">Instagram Kullanıcı Adı</label>
                        <div class="input-with-prefix">
                            <span class="input-prefix">@</span>
                            <input type="text" 
                                   id="profile-org-instagram" 
                                   class="profile-input profile-input-with-prefix" 
                                   placeholder="yourusername">
                        </div>
                    </div>
                </div>
                <div class="profile-modal-footer">
                    <p class="profile-footer-note">Tüm etkinliklerinizde otomatik kullanılır</p>
                    <button class="profile-cancel-btn" id="profile-cancel-btn">İptal</button>
                    <button class="profile-save-btn" id="profile-save-btn">Profili Kaydet</button>
                </div>
            </div>
        </div>

        <!-- Footer inside scrollable section -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-content">
                    <div class="footer-section">
                        <div class="footer-logo">
                            <img src="../pax-logo.png" alt="PAX" class="logo-image footer-logo-image">
                        </div>
                        <p class="footer-text">Şehrin en iyi etkinliklerini sizinle buluşturuyoruz.</p>
                    </div>
                    <div class="footer-section">
                        <h4>Hızlı Erişim</h4>
                        <ul class="footer-links">
                            <li><a href="dashboard.html">Panel</a></li>
                            <li><a href="../about.html">Hakkımızda</a></li>
                            <li><a href="dashboard.html">Etkinliklerim</a></li>
                            <li><a href="#" id="footer-logout">Çıkış Yap</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Bizi Takip Et</h4>
                        <div class="social-links">
                            <a href="#" class="social-link">Instagram</a>
                            <a href="#" class="social-link">Twitter</a>
                            <a href="#" class="social-link">Facebook</a>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 PAX. Tüm hakları saklıdır.</p>
                </div>
            </div>
        </footer>
    </section>

    <script src="../script.js?v=20260330b"></script>
    <script src="cms.js?v=20260330a"></script>
</body>
</html>
