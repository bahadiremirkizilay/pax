<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Your Events - PAX</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GS721ZWJJF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GS721ZWJJF');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Yellowtail&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=20260328M">
    <link rel="stylesheet" href="cms.css?v=20260328n">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <img src="../star-icon.png" alt="Star" class="star-decoration">
                <div class="menu-toggle" id="mobile-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            
            <div class="nav-center">
                <div class="logo">
                    <img src="../pax-logo.png" alt="PAX" class="logo-image">
                </div>
            </div>
            
            <div class="nav-right">
                <button class="top-link create-event-btn-nav" id="create-event-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Create New Event
                </button>
                <button class="top-link dashboard-profile-btn" id="profile-btn" title="Profile">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>
                <button class="top-link dashboard-logout-btn" id="logout-btn" title="Logout">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <section class="events-section" id="events">
        <!-- Hero Spacer: Creates initial view where navbar stays visible -->
        <div class="events-hero-spacer"></div>
        
        <div class="section-container">
            <div class="events-grid" id="events-grid">
                <!-- Event cards will be generated by JavaScript -->
            </div>
        </div>

        <!-- Organizer Profile Modal -->
        <div class="profile-modal" id="profile-modal" style="display: none;">
            <div class="profile-modal-overlay" id="profile-modal-overlay"></div>
            <div class="profile-modal-content">
                <div class="profile-modal-header">
                    <h2>Organizer Profile</h2>
                    <button class="profile-modal-close" id="profile-modal-close" aria-label="Close profile">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="profile-modal-body">
                    <p style="color: var(--text-secondary); margin-bottom: 0.75rem; font-size: 0.85rem;">
                        Tüm etkinliklerinizde otomatik kullanılır.
                    </p>
                    <div class="profile-form-group">
                        <label for="profile-org-name">Organizer Name *</label>
                        <input type="text" 
                               id="profile-org-name" 
                               class="profile-input" 
                               placeholder="Event organizer or company name">
                    </div>
                    <div class="profile-form-group">
                        <label for="profile-org-bio">Organizer Bio</label>
                        <textarea id="profile-org-bio" 
                                  class="profile-input" 
                                  rows="4"
                                  placeholder="Brief description about the organizer"></textarea>
                    </div>
                    <div class="profile-form-group">
                        <label for="profile-org-events">Total Events Organized</label>
                        <input type="number" 
                               id="profile-org-events" 
                               class="profile-input" 
                               placeholder="e.g., 50"
                               min="0">
                    </div>
                </div>
                <div class="profile-modal-footer">
                    <button class="profile-cancel-btn" id="profile-cancel-btn">Cancel</button>
                    <button class="profile-save-btn" id="profile-save-btn">Save Profile</button>
                </div>
            </div>
        </div>

        <!-- Footer inside scrollable section -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-content">
                    <div class="footer-section">
                        <div class="footer-logo">
                            <img src="../pax-logo.png" alt="PAX" class="logo-image footer-logo-image">
                        </div>
                        <p class="footer-text">Connecting you with the best events in the city.</p>
                    </div>
                    <div class="footer-section">
                        <h4>Quick Links</h4>
                        <ul class="footer-links">
                            <li><a href="../index.html">Home</a></li>
                            <li><a href="../about.html">About</a></li>
                            <li><a href="dashboard.html">Your Events</a></li>
                            <li><a href="#" id="footer-logout">Logout</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Follow Us</h4>
                        <div class="social-links">
                            <a href="#" class="social-link">Instagram</a>
                            <a href="#" class="social-link">Twitter</a>
                            <a href="#" class="social-link">Facebook</a>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 PAX. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </section>

    <script src="../script.js?v=20260328e"></script>
    <script src="cms.js?v=20260328N"></script>
</body>
</html>
