<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>PAX - Discover Amazing Events</title>
    <meta name="description" content="Discover the hottest nightlife events, concerts, and parties in your city. PAX brings you the best curated events all in one place.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pax.com/">
    <meta property="og:title" content="PAX - Discover Amazing Events">
    <meta property="og:description" content="Discover the hottest nightlife events, concerts, and parties in your city. PAX brings you the best curated events all in one place.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://pax.com/">
    <meta property="twitter:title" content="PAX - Discover Amazing Events">
    <meta property="twitter:description" content="Discover the hottest nightlife events, concerts, and parties in your city.">
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GS721ZWJJF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GS721ZWJJF');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Yellowtail&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <img src="star-icon.png" alt="Star" class="star-decoration">
            </div>
            
            <div class="nav-center">
                <a href="index.html" class="logo" aria-label="Go to homepage">
                    <img src="pax-logo.png" alt="PAX" class="logo-image">
                </a>
            </div>
            
            <div class="nav-right">
                <div class="search-bar-wrapper">
                    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search events..." aria-label="Search events">
                    <button id="search-clear-btn" class="search-clear-btn" aria-label="Clear search">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <button type="button" class="navbar-filter-icon" id="open-filter-drawer" aria-label="Open filters" aria-expanded="false">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="4" y1="8" x2="20" y2="8" stroke-linecap="round" stroke-width="2"></line>
                        <line x1="4" y1="16" x2="20" y2="16" stroke-linecap="round" stroke-width="2"></line>
                        <circle cx="9" cy="8" r="2" fill="currentColor" stroke="none"></circle>
                        <circle cx="15" cy="16" r="2" fill="currentColor" stroke="none"></circle>
                    </svg>
                </button>
                <a href="cms/" class="organizer-icon-navbar" aria-label="Organizer Portal">
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </a>
                <button type="button" class="mobile-filter-icon" id="open-filter-drawer-mobile" aria-label="Open filters" aria-expanded="false">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="4" y1="8" x2="20" y2="8" stroke-linecap="round" stroke-width="2"></line>
                        <line x1="4" y1="16" x2="20" y2="16" stroke-linecap="round" stroke-width="2"></line>
                        <circle cx="9" cy="8" r="2" fill="currentColor" stroke="none"></circle>
                        <circle cx="15" cy="16" r="2" fill="currentColor" stroke="none"></circle>
                    </svg>
                </button>
                <a href="cms/" class="organizer-icon-mobile" aria-label="Organizer Portal">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Landing Section (Mobile Only via CSS) -->
    <section class="hero-landing" id="hero-landing">
        <div class="hero-landing-content">
            <h1 class="hero-landing-title">
                Discover <span class="gradient-text">Tonight</span>
            </h1>
            <button class="hero-scroll-btn" id="hero-scroll-btn" aria-label="Scroll to events">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                </svg>
            </button>
        </div>
    </section>

    <section class="events-section" id="events">
        <div class="events-hero-spacer"></div>
        
        <div id="search-results-info" class="search-results-info" style="display: none;"></div>
        
        <div class="section-container">
            <div class="events-grid" id="events-grid">
                <!-- Event cards will be generated by JavaScript -->
            </div>
        </div>

        <!-- Footer inside scrollable section -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-content">
                    <div class="footer-section">
                        <div class="footer-logo">
                            <img src="pax-logo.png" alt="PAX" class="logo-image footer-logo-image">
                        </div>
                        <p class="footer-text">Connecting you with the best events in the city.</p>
                    </div>
                    <div class="footer-section">
                        <h4>Quick Links</h4>
                        <ul class="footer-links">
                            <li><a href="#hero-landing">Home</a></li>
                            <li><a href="about.html">About</a></li>
                            <li><a href="#events">Events</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Contact</h4>
                        <ul class="footer-links">
                            <li><a href="mailto:info@pax.com">info@pax.com</a></li>
                            <li><a href="cms/">Organizer Portal</a></li>
                        </ul>
                    </div>
                    <div class="footer-section desktop-only">
                        <h4>Follow Us</h4>
                        <div class="social-links">
                            <a href="#" class="social-link">Instagram</a>
                            <a href="#" class="social-link">Twitter</a>
                            <a href="#" class="social-link">Facebook</a>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 PAX. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </section>

    <!-- Filter Drawer (positioned at body level for proper fixed positioning) -->
    <div class="filter-drawer" id="filter-drawer" role="dialog" aria-labelledby="filter-drawer-title" aria-modal="true">
        <div class="filter-drawer-overlay" id="filter-drawer-overlay"></div>
        <div class="filter-drawer-panel">
            <div class="filter-drawer-header">
                <h3 id="filter-drawer-title">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="4" y1="8" x2="20" y2="8" stroke-linecap="round" stroke-width="2"></line>
                        <line x1="4" y1="16" x2="20" y2="16" stroke-linecap="round" stroke-width="2"></line>
                        <circle cx="9" cy="8" r="2" fill="currentColor" stroke="none"></circle>
                        <circle cx="15" cy="16" r="2" fill="currentColor" stroke="none"></circle>
                    </svg>
                    Filter Events
                </h3>
                <button class="filter-drawer-close" id="close-filter-drawer" aria-label="Close filter menu">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="filter-drawer-content">
                <!-- Date Range Filter -->
                <div class="drawer-filter-group">
                    <label class="drawer-filter-label">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                        </svg>
                        Date Range
                    </label>
                    <div class="date-range-inputs">
                        <input type="date" id="date-start" class="drawer-filter-input" placeholder="Start Date" aria-label="Filter start date">
                        <span class="date-separator">to</span>
                        <input type="date" id="date-end" class="drawer-filter-input" placeholder="End Date" aria-label="Filter end date">
                    </div>
                </div>

                <!-- Price Level Filter -->
                <div class="drawer-filter-group">
                    <label class="drawer-filter-label">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Price Level
                    </label>
                    <div class="drawer-price-checkboxes">
                        <label class="drawer-checkbox-label">
                            <input type="checkbox" class="price-checkbox" value="1" checked>
                            <span class="drawer-checkbox-text">$</span>
                        </label>
                        <label class="drawer-checkbox-label">
                            <input type="checkbox" class="price-checkbox" value="2" checked>
                            <span class="drawer-checkbox-text">$$</span>
                        </label>
                        <label class="drawer-checkbox-label">
                            <input type="checkbox" class="price-checkbox" value="3" checked>
                            <span class="drawer-checkbox-text">$$$</span>
                        </label>
                        <label class="drawer-checkbox-label">
                            <input type="checkbox" class="price-checkbox" value="4" checked>
                            <span class="drawer-checkbox-text">$$$$</span>
                        </label>
                        <label class="drawer-checkbox-label">
                            <input type="checkbox" class="price-checkbox" value="5" checked>
                            <span class="drawer-checkbox-text">$$$$$</span>
                        </label>
                    </div>
                </div>

                <div class="filter-results-display" id="filter-results">Showing all events</div>
            </div>

            <div class="filter-drawer-actions">
                <button class="drawer-reset-btn" id="clear-filters">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Reset Filters
                </button>
                <button class="drawer-apply-btn" id="apply-filters">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Apply Filters
                </button>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260330b"></script>
</body>
</html>
